databases:
  - name: dentflow-db
    databaseName: dentflow
    plan: free

services:
  # ── Django Backend ───────────────────────────────────────────────────────────
  - type: web
    name: dentflow-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn dentflow.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: dentflow-db
          property: connectionString
      - key: TRIAL_ENABLED
        value: "True"
      - key: TRIAL_DAYS
        value: "30"
      - key: SUBSCRIPTION_GRACE_DAYS
        value: "3"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # WhatsApp microservice — update after deploying dentflow-whatsapp below
      - key: WHATSAPP_SERVICE_URL
        fromService:
          name: dentflow-whatsapp
          type: web
          property: hostURL
      - key: WHATSAPP_SERVICE_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false

  # ── Node.js WhatsApp Microservice ────────────────────────────────────────────
  - type: web
    name: dentflow-whatsapp
    runtime: node
    rootDir: whatsapp-service
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SERVICE_SECRET
        sync: false
      - key: PUPPETEER_EXECUTABLE_PATH
        value: "/usr/bin/google-chrome-stable"
